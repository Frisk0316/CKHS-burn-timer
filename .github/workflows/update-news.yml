name: 每日更新建中炎上新聞

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 10:00 台灣時間 (UTC+8 → UTC 02:00)
  workflow_dispatch:       # 允許在 GitHub 網頁手動觸發

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest news
        run: python scripts/fetch_news.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add incidents.json
          git diff --cached --quiet && echo "No new items, skipping commit." && exit 0
          git commit -m "chore: 自動更新建中新聞 $(TZ='Asia/Taipei' date +'%Y-%m-%d %H:%M')"
          git push
